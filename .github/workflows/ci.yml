name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: ["macos-latest", "windows-latest", "ubuntu-latest"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.21.1
        uses: actions/setup-node@v3
        with:
          node-version: 22.21.1

      - name: install shell-use
        if: matrix.os != 'windows-latest'
        shell: bash
        env:
          SHELL_USE_INSTALL_DIR: ${{ runner.temp }}/shell-use/bin
        run: |
          export SHELL_USE_VERSION="$(node -p "require('./package.json').devDependencies['@microsoft/shell-use']")"
          curl --proto '=https' --tlsv1.2 -LsSf https://raw.githubusercontent.com/microsoft/shell-use/main/install/install.sh | sh
          echo "$SHELL_USE_INSTALL_DIR" >> "$GITHUB_PATH"

      - name: install shell-use
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          SHELL_USE_INSTALL_DIR: ${{ runner.temp }}\shell-use\bin
        run: |
          $env:SHELL_USE_VERSION = node -p "require('./package.json').devDependencies['@microsoft/shell-use']"
          irm https://raw.githubusercontent.com/microsoft/shell-use/main/install/install.ps1 | iex
          $env:SHELL_USE_INSTALL_DIR | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: setup macOS shells
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          brew install fish
          brew install zsh

          for dir in /usr/local/share/zsh /usr/local/share/zsh/site-functions /usr/share/zsh /opt/homebrew/share/zsh /opt/homebrew/share/zsh/site-functions /opt/homebrew/share/fish /opt/homebrew/share/fish/vendor_completions.d; do
            [ -d "$dir" ] && sudo chmod g-w "$dir"
          done

      - name: setup linux shells
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-add-repository ppa:fish-shell/release-3
          sudo apt-get update
          sudo apt install fish zsh

          sudo chmod -R 755 /usr/share/zsh/vendor-completions
          sudo chown -R root:root /usr/share/zsh/vendor-completions
          sudo chmod -R 755 /usr/share/zsh
          sudo chown -R root:root /usr/share/zsh

      - name: setup windows shells
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          python -m pip install 'xonsh[full]'

      - name: setup oh-my-zsh
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended --keep-zshrc
          git clone --depth=1 https://github.com/romkatv/powerlevel10k.git "${ZSH_CUSTOM:-$HOME/.oh-my-zsh/custom}/themes/powerlevel10k"

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build

      - run: npm link

      - run: npm run test:e2e